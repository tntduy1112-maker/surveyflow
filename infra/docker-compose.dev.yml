# Dev VPS deployment — survey-app
# Usage: docker compose -f docker-compose.dev.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: survey-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - survey-internal

  redis:
    image: redis:7-alpine
    container_name: survey-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - survey-internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: survey-backend
    restart: always
    env_file: .env
    environment:
      APP_ENV:      development
      DB_HOST:      postgres
      DB_PORT:      5432
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      FRONTEND_URL: "http://${VPS_HOST:-localhost}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - survey-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: survey-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - survey-internal

volumes:
  postgres_data:
  redis_data:

networks:
  survey-internal:
    driver: bridge
